<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#000000" />
    <title>JollibeeAR</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-face-aframe.prod.js"></script>
    <script>
      AFRAME.registerComponent('emote-switcher', {
        init: function () {
          this._showBee     = true;
          this._popElapsed  = -1;
          this._wasSmiling  = false;
          this._smileFrames = 0;
          this._ready       = false;
          this._noFace      = document.getElementById('no-face');
          this._hideTimer   = null;
          var self = this;
          setInterval(function () { self._showBee = !self._showBee; }, 1000);
        },
        tick: function (time, timeDelta) {
          if (!this._ready) {
            this._bee    = document.getElementById('bee-img');
            this._jolli  = document.getElementById('jolli-img');
            this._anchor = document.getElementById('anchor-168');
            this._lm61   = document.getElementById('lm-61');
            this._lm291  = document.getElementById('lm-291');
            this._lm13   = document.getElementById('lm-13');
            this._lm14   = document.getElementById('lm-14');
            if (!this._bee || !this._lm61) return;
            this._ready = true;
          }
          if (!this._anchor.object3D.visible) {
            if (this._hideTimer) { clearTimeout(this._hideTimer); this._hideTimer = null; }
            this._noFace.style.display = 'flex';
            this._bee.object3D.visible   = false;
            this._jolli.object3D.visible = false;
            this._smileFrames = 0; this._popElapsed = -1; this._wasSmiling = false;
            return;
          }
          if (this._noFace.style.display !== 'none') {
            if (!this._hideTimer) {
              var nf = this._noFace;
              this._hideTimer = setTimeout(function () { nf.style.display = 'none'; }, 1000);
            }
          } else {
            if (this._hideTimer) { clearTimeout(this._hideTimer); this._hideTimer = null; }
          }
          var e61  = this._lm61.object3D.matrix.elements;
          var e291 = this._lm291.object3D.matrix.elements;
          var e13  = this._lm13.object3D.matrix.elements;
          var e14  = this._lm14.object3D.matrix.elements;
          var faceWidth = Math.abs(e61[12] - e291[12]);
          var cornersUp = faceWidth > 0 && ((e61[13] + e291[13]) / 2 - e13[13]) / faceWidth > 0.08;
          var mouthOpen = faceWidth > 0 && (e13[13] - e14[13]) / faceWidth > 0.12;
          if (cornersUp || mouthOpen) { this._smileFrames = Math.min(this._smileFrames + 1, 10); }
          else                        { this._smileFrames = Math.max(this._smileFrames - 2, 0);  }
          var smiling = this._smileFrames >= 4;
          if (smiling && !this._wasSmiling) { this._popElapsed = 0; }
          this._wasSmiling = smiling;
          this._noFace.style.display = 'none';
          if (this._hideTimer) { clearTimeout(this._hideTimer); this._hideTimer = null; }
          if (smiling) {
            this._bee.object3D.visible   = this._showBee;
            this._jolli.object3D.visible = !this._showBee;
            if (this._popElapsed >= 0 && this._popElapsed < 500) {
              var t = this._popElapsed / 500;
              var s = t < 0.55 ? (t / 0.55) * 1.35 : 1.35 - ((t - 0.55) / 0.45) * 0.35;
              this._bee.object3D.scale.set(s, s, s);
              this._jolli.object3D.scale.set(s, s, s);
              this._popElapsed += timeDelta;
            } else if (this._popElapsed >= 500) {
              this._bee.object3D.scale.set(1, 1, 1);
              this._jolli.object3D.scale.set(1, 1, 1);
              this._popElapsed = -1;
            }
          } else {
            this._bee.object3D.visible   = false;
            this._jolli.object3D.visible = false;
            this._bee.object3D.scale.set(1, 1, 1);
            this._jolli.object3D.scale.set(1, 1, 1);
            this._popElapsed = -1;
          }
        }
      });
    </script>
    <style>
      body { margin: 0; background: #000; overscroll-behavior: none; -webkit-user-select: none; user-select: none; }
      html, body { height: 100%; height: -webkit-fill-available; }
      .example-container { overflow: hidden; position: absolute; width: 100%; height: 100%; touch-action: none; }
      #no-face { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; z-index: 50; }
      #no-face img { width: 85%; max-width: 360px; height: auto; }
      #top-bar { position: fixed; top: 0; left: 0; right: 0; padding-top: max(12px, env(safe-area-inset-top)); padding-bottom: 12px; display: flex; align-items: center; justify-content: center; background: linear-gradient(to bottom, rgba(0,0,0,0.55) 0%, transparent 100%); z-index: 100; }
      #app-title img { height: 24px; width: auto; display: block; }
      #bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; padding-bottom: max(28px, env(safe-area-inset-bottom)); padding-left: max(40px, env(safe-area-inset-left)); padding-right: max(40px, env(safe-area-inset-right)); padding-top: 20px; display: flex; align-items: center; justify-content: space-between; background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 100%); z-index: 100; }
      .bar-side-btn { background: none; border: none; padding: 0; cursor: pointer; -webkit-tap-highlight-color: transparent; color: #fff; min-width: 52px; min-height: 52px; display: flex; align-items: center; justify-content: center; touch-action: manipulation; opacity: 0.9; }
      .bar-side-btn img { width: 44px; height: 44px; object-fit: contain; display: block; }
      #capture-wrap { position: relative; display: flex; align-items: center; justify-content: center; }
      #capture-btn { width: 76px; height: 76px; border-radius: 50%; background: transparent; border: 4px solid rgba(255,255,255,0.85); display: flex; align-items: center; justify-content: center; cursor: pointer; -webkit-tap-highlight-color: transparent; padding: 0; touch-action: manipulation; }
      #capture-inner { width: 60px; height: 60px; border-radius: 50%; background: #fff; transition: border-radius 0.2s, background 0.2s, width 0.2s, height 0.2s; pointer-events: none; }
      #share-overlay { display: none; position: fixed; inset: 0; z-index: 150; background: rgba(0,0,0,0.82); align-items: center; justify-content: center; }
      #share-overlay.visible { display: flex; }
      #share-overlay > img { max-width: 88%; max-height: 82vh; height: auto; border-radius: 16px; }
      #share-close { position: absolute; top: max(18px, env(safe-area-inset-top)); right: 18px; background: rgba(0,0,0,0.55); border: 2px solid rgba(255,255,255,0.6); color: #fff; font-size: 1.1rem; line-height: 1; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; font-family: sans-serif; }
    </style>
  </head>
  <body>
    <script>
      (function () {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return;
        var facing = sessionStorage.getItem('cameraFacing') || 'user';
        var _orig = navigator.mediaDevices.getUserMedia.bind(navigator.mediaDevices);
        navigator.mediaDevices.getUserMedia = function (constraints) {
          if (constraints && constraints.video) {
            if (typeof constraints.video === 'object') { constraints.video.facingMode = facing; }
            else { constraints.video = { facingMode: facing }; }
          }
          return _orig(constraints);
        };
      })();
    </script>
    <div id="top-bar"><span id="app-title"><img src="assets/header.png" alt="JollibeeAR" /></span></div>
    <div id="no-face"><img src="assets/noface.png" alt="Smile ka na para lumabas ang WOW BIDA!" /></div>
    <div class="example-container">
      <a-scene mindar-face emote-switcher embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights: true, preserveDrawingBuffer: true" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-assets>
          <a-asset-item id="headModel" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/face-tracking/assets/sparkar/headOccluder.glb"></a-asset-item>
          <img id="bee-tex"        src="assets/emotes/bee.png" />
          <img id="jolli-tex"      src="assets/emotes/Jolli.png" />
          <img id="back-bee-tex"   src="assets/emotes/back_bee.png" />
          <img id="back-jolli-tex" src="assets/emotes/back_jolli.png" />
        </a-assets>
        <a-camera active="false" position="0 0 0"></a-camera>
        <a-entity mindar-face-target="anchorIndex: 168">
          <a-gltf-model mindar-face-occluder position="0 -0.3 0.15" rotation="0 0 0" scale="0.065 0.065 0.065" src="#headModel"></a-gltf-model>
        </a-entity>
        <a-entity id="anchor-168" mindar-face-target="anchorIndex: 168">
          <a-image id="bee-img"   src="#bee-tex"   position="0 0.7 0" width="1.2" height="1.2" transparent="true" visible="true"></a-image>
          <a-image id="jolli-img" src="#jolli-tex" position="0 0.7 0" width="1.2" height="1.2" transparent="true" visible="false"></a-image>
        </a-entity>
        <a-entity id="lm-61"  mindar-face-target="anchorIndex: 61"></a-entity>
        <a-entity id="lm-291" mindar-face-target="anchorIndex: 291"></a-entity>
        <a-entity id="lm-13"  mindar-face-target="anchorIndex: 13"></a-entity>
        <a-entity id="lm-14"  mindar-face-target="anchorIndex: 14"></a-entity>
      </a-scene>
    </div>
    <div id="bottom-bar">
      <button class="bar-side-btn" id="camera-btn" title="Switch camera"><img src="assets/change-camera.png" alt="Switch camera" /></button>
      <div id="capture-wrap">
        <button id="capture-btn" title="Take photo"><div id="capture-inner"></div></button>
      </div>
      <button class="bar-side-btn" id="share-btn" title="Share"><img src="assets/share-button.png" alt="Share" /></button>
    </div>
    <div id="share-overlay">
      <img src="assets/share.png" alt="Share - WOW BIDA!" />
      <button id="share-close">&#x2715;</button>
    </div>
    <script>
      (function () {
        var captureBtn   = document.getElementById('capture-btn');
        var shareOverlay = document.getElementById('share-overlay');
        var currentFacing = sessionStorage.getItem('cameraFacing') || 'user';

        var headerImg = new Image();
        headerImg.src = 'assets/header.png';

        if (currentFacing === 'environment') {
          document.querySelector('.example-container').style.transform = 'scaleX(-1)';
          function swapBackEmotes() {
            var bee   = document.getElementById('bee-img');
            var jolli = document.getElementById('jolli-img');
            if (bee)   bee.setAttribute('src', '#back-bee-tex');
            if (jolli) jolli.setAttribute('src', '#back-jolli-tex');
          }
          if (document.getElementById('bee-img')) { swapBackEmotes(); }
          else { document.querySelector('a-scene').addEventListener('loaded', swapBackEmotes); }
        }

        function getGlCanvas() {
          return document.querySelector('a-scene canvas') || document.querySelector('canvas.a-canvas');
        }

        // Hook into Three.js renderer after scene loads so bufferCanvas is always
        // a fresh copy of the GL canvas, updated synchronously after every render.
        var bufferCanvas = null;
        var bufferCtx    = null;
        var bufferReady  = false;

        document.querySelector('a-scene').addEventListener('loaded', function () {
          var sceneEl  = document.querySelector('a-scene');
          var glCanvas = sceneEl.canvas;
          bufferCanvas        = document.createElement('canvas');
          bufferCanvas.width  = glCanvas.width;
          bufferCanvas.height = glCanvas.height;
          bufferCtx           = bufferCanvas.getContext('2d');
          var origRender = sceneEl.renderer.render.bind(sceneEl.renderer);
          sceneEl.renderer.render = function (scene, camera) {
            origRender(scene, camera);
            if (bufferCanvas.width !== glCanvas.width || bufferCanvas.height !== glCanvas.height) {
              bufferCanvas.width  = glCanvas.width;
              bufferCanvas.height = glCanvas.height;
            }
            bufferCtx.drawImage(glCanvas, 0, 0);
            bufferReady = true;
          };
        });

        function applyComposite(ctx, w, h) {
          if (!bufferReady || !bufferCanvas || !bufferCanvas.width) return;
          ctx.clearRect(0, 0, w, h);
          if (currentFacing === 'environment') {
            ctx.save();
            ctx.translate(w, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(bufferCanvas, 0, 0, w, h);
            ctx.restore();
          } else {
            ctx.drawImage(bufferCanvas, 0, 0, w, h);
          }
          if (headerImg.complete && headerImg.naturalWidth > 0) {
            var dpr = Math.min(window.devicePixelRatio || 1, 2);
            var hH  = Math.round(24 * dpr);
            var hW  = Math.round(headerImg.naturalWidth * hH / headerImg.naturalHeight);
            var hX  = Math.round((w - hW) / 2);
            var hY  = Math.round(12 * dpr);
            ctx.drawImage(headerImg, hX, hY, hW, hH);
          }
        }

        function flashScreen() {
          var f = document.createElement('div');
          f.style.cssText = 'position:fixed;inset:0;background:#fff;z-index:200;opacity:0.75;pointer-events:none;transition:opacity 0.35s';
          document.body.appendChild(f);
          requestAnimationFrame(function () { requestAnimationFrame(function () {
            f.style.opacity = '0'; setTimeout(function () { document.body.removeChild(f); }, 400);
          }); });
        }

        function takePhoto() {
          if (!bufferReady || !bufferCanvas || !bufferCanvas.width) return;
          flashScreen();
          var w   = bufferCanvas.width;
          var h   = bufferCanvas.height;
          var out = document.createElement('canvas');
          out.width = w; out.height = h;
          applyComposite(out.getContext('2d'), w, h);
          out.toBlob(function (blob) {
            if (!blob) return;
            // iOS 15+: share via native sheet so user can save to Photos
            if (navigator.share && navigator.canShare && navigator.canShare({ files: [new File([blob], 'x.jpg', { type: 'image/jpeg' })] })) {
              var file = new File([blob], 'jollibee-ar-' + Date.now() + '.jpg', { type: 'image/jpeg' });
              navigator.share({ files: [file], title: 'JollibeeAR - WOW BIDA!' }).catch(function () {});
            } else {
              // Fallback: open in new tab, long-press to save
              var url = URL.createObjectURL(blob);
              window.open(url, '_blank');
              setTimeout(function () { URL.revokeObjectURL(url); }, 10000);
            }
          }, 'image/jpeg', 0.92);
        }

        captureBtn.addEventListener('click', function (e) {
          e.preventDefault();
          takePhoto();
        });

        document.getElementById('camera-btn').addEventListener('click', function () {
          var next = currentFacing === 'user' ? 'environment' : 'user';
          sessionStorage.setItem('cameraFacing', next);
          window.location.reload();
        });

        document.getElementById('share-btn').addEventListener('click', function () {
          if (navigator.share) {
            navigator.share({ title: 'JollibeeAR - WOW BIDA!', url: window.location.href }).catch(function () {});
          } else {
            shareOverlay.classList.add('visible');
          }
        });
        document.getElementById('share-close').addEventListener('click', function () { shareOverlay.classList.remove('visible'); });
        shareOverlay.addEventListener('click', function (e) { if (e.target === shareOverlay) shareOverlay.classList.remove('visible'); });
      })();
    </script>
  </body>
</html>
