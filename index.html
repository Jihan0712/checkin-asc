<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="JollibeeAR – put a Jollibee emote on your forehead!" />
    <title>JollibeeAR</title>

    <!-- PWA manifest -->
    <link rel="manifest" href="manifest.json" />

    <!-- MindAR face bundle (includes Three.js r128) -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-face-three.prod.js"></script>

    <link rel="stylesheet" href="src/style.css" />
  </head>
  <body>
    <!-- Shown only when not on HTTPS/localhost -->
    <div id="insecure-banner" style="display:none;position:fixed;inset:0;z-index:999;background:#111;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px;text-align:center;font-family:sans-serif;">
      <span style="font-size:3rem;">🔒</span>
      <strong style="font-size:1.2rem;">Camera requires a secure connection</strong>
      <p style="opacity:.8;max-width:320px;">Open this page through <b>Live Server</b> in VS Code<br>(right-click index.html → Open with Live Server)<br>or deploy to Cloudflare Pages for HTTPS.</p>
    </div>

    <!-- MindAR mounts its video + canvas here -->
    <div id="container"></div>

    <!-- No-face overlay -->
    <div id="no-face">
      <span>😶</span>
      <p>Point your camera at a face</p>
    </div>

    <!-- Top bar -->
    <div id="top-bar">
      <span id="app-title">JollibeeAR</span>
      <button id="snap-btn" title="Take screenshot">📸</button>
    </div>

    <!-- defer (not module) so it works on localhost without CORS errors -->
    <script src="src/main.js" defer></script>
  </body>
</html>
