<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#000000" />
    <title>JollibeeAR</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-face-aframe.prod.js"></script>
    <script>
      AFRAME.registerComponent('emote-switcher', {
        init: function () {
          this._showBee     = true;
          this._popElapsed  = -1;
          this._wasSmiling  = false;
          this._smileFrames = 0;
          this._ready       = false;
          this._noFace      = document.getElementById('no-face');
          this._hideTimer   = null;
          var self = this;

          document.querySelector('a-scene').addEventListener('arReady', function () {
            // AR is ready — overlay will be controlled per-frame in tick
          });

          setInterval(function () {
            self._showBee = !self._showBee;
          }, 1000);
        },

        tick: function (time, timeDelta) {
          if (!this._ready) {
            this._bee    = document.getElementById('bee-img');
            this._jolli  = document.getElementById('jolli-img');
            this._anchor = document.getElementById('anchor-168');
            this._lm61   = document.getElementById('lm-61');
            this._lm291  = document.getElementById('lm-291');
            this._lm13   = document.getElementById('lm-13');
            this._lm14   = document.getElementById('lm-14');
            if (!this._bee || !this._lm61) return;
            this._ready = true;
          }

          if (!this._anchor.object3D.visible) {
            // Show no-face overlay immediately when face is lost
            if (this._hideTimer) { clearTimeout(this._hideTimer); this._hideTimer = null; }
            this._noFace.style.display = 'flex';
            this._bee.object3D.visible   = false;
            this._jolli.object3D.visible = false;
            this._smileFrames = 0;
            this._popElapsed  = -1;
            this._wasSmiling  = false;
            return;
          }

          // Face detected — hide no-face overlay after 1000ms delay
          if (this._noFace.style.display !== 'none') {
            if (!this._hideTimer) {
              var nf = this._noFace;
              this._hideTimer = setTimeout(function () { nf.style.display = 'none'; }, 1000);
            }
          } else {
            if (this._hideTimer) { clearTimeout(this._hideTimer); this._hideTimer = null; }
          }

          // Read world-space positions from landmark matrices
          var e61  = this._lm61.object3D.matrix.elements;
          var e291 = this._lm291.object3D.matrix.elements;
          var e13  = this._lm13.object3D.matrix.elements;
          var e14  = this._lm14.object3D.matrix.elements;

          var faceWidth  = Math.abs(e61[12] - e291[12]);
          // Mouth corners higher (larger Y) than upper lip center = smile
          var cornersUp  = faceWidth > 0 && ((e61[13] + e291[13]) / 2 - e13[13]) / faceWidth > 0.08;
          // Upper lip lower than lower lip = mouth open
          var mouthOpen  = faceWidth > 0 && (e13[13] - e14[13]) / faceWidth > 0.12;

          if (cornersUp || mouthOpen) { this._smileFrames = Math.min(this._smileFrames + 1, 10); }
          else                        { this._smileFrames = Math.max(this._smileFrames - 2, 0);  }

          var smiling = this._smileFrames >= 4;

          if (smiling && !this._wasSmiling) { this._popElapsed = 0; }
          this._wasSmiling = smiling;

          this._noFace.style.display = 'none';
          if (this._hideTimer) { clearTimeout(this._hideTimer); this._hideTimer = null; }

          if (smiling) {
            this._bee.object3D.visible   = this._showBee;
            this._jolli.object3D.visible = !this._showBee;

            if (this._popElapsed >= 0 && this._popElapsed < 500) {
              var t = this._popElapsed / 500;
              var s = t < 0.55
                ? (t / 0.55) * 1.35
                : 1.35 - ((t - 0.55) / 0.45) * 0.35;
              this._bee.object3D.scale.set(s, s, s);
              this._jolli.object3D.scale.set(s, s, s);
              this._popElapsed += timeDelta;
            } else if (this._popElapsed >= 500) {
              this._bee.object3D.scale.set(1, 1, 1);
              this._jolli.object3D.scale.set(1, 1, 1);
              this._popElapsed = -1;
            }
          } else {
            this._bee.object3D.visible   = false;
            this._jolli.object3D.visible = false;
            this._bee.object3D.scale.set(1, 1, 1);
            this._jolli.object3D.scale.set(1, 1, 1);
            this._popElapsed = -1;
          }
        }
      });
    </script>
    <style>
      body {
        margin: 0;
        background: #000;
        overscroll-behavior: none;
        -webkit-user-select: none;
        user-select: none;
      }
      html, body {
        height: 100%;
        height: -webkit-fill-available;
      }
      .example-container {
        overflow: hidden;
        position: absolute;
        width: 100%;
        height: 100%;
        touch-action: none;
      }
      /* ── No-face overlay ── */
      #no-face {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        z-index: 50;
      }
      #no-face img { width: 85%; max-width: 360px; height: auto; }
      /* ── Top bar ── */
      #top-bar {
        position: fixed;
        top: 0; left: 0; right: 0;
        padding-top: max(12px, env(safe-area-inset-top));
        padding-bottom: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(to bottom, rgba(0,0,0,0.55) 0%, transparent 100%);
        z-index: 100;
      }
      #app-title img { height: 24px; width: auto; display: block; }
      /* ── Bottom bar ── */
      #bottom-bar {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        padding-bottom: max(28px, env(safe-area-inset-bottom));
        padding-left: max(40px, env(safe-area-inset-left));
        padding-right: max(40px, env(safe-area-inset-right));
        padding-top: 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 100%);
        z-index: 100;
      }
      .bar-side-btn {
        background: none;
        border: none;
        padding: 0;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        color: #fff;
        min-width: 52px;
        min-height: 52px;
        display: flex;
        align-items: center;
        justify-content: center;
        touch-action: manipulation;
        opacity: 0.9;
      }
      #capture-wrap {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #capture-btn {
        width: 76px;
        height: 76px;
        border-radius: 50%;
        background: transparent;
        border: 4px solid rgba(255,255,255,0.85);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        padding: 0;
        touch-action: manipulation;
      }
      #capture-inner {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: #fff;
        transition: border-radius 0.2s, background 0.2s, width 0.2s, height 0.2s;
        pointer-events: none;
      }
      #capture-btn.recording #capture-inner {
        border-radius: 10px;
        background: #e0303a;
        width: 36px;
        height: 36px;
      }
      #rec-badge {
        position: absolute;
        top: -28px;
        left: 50%;
        transform: translateX(-50%);
        background: #e0303a;
        color: #fff;
        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 0.05em;
        padding: 3px 8px;
        border-radius: 4px;
        display: none;
        font-family: sans-serif;
        white-space: nowrap;
      }
      .bar-side-btn img {
        width: 44px;
        height: 44px;
        object-fit: contain;
        display: block;
      }
      /* ── Share overlay ── */
      #share-overlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 150;
        background: rgba(0,0,0,0.82);
        align-items: center;
        justify-content: center;
      }
      #share-overlay.visible { display: flex; }
      #share-overlay > img {
        max-width: 88%;
        max-height: 82vh;
        height: auto;
        border-radius: 16px;
      }
      #share-close {
        position: absolute;
        top: max(18px, env(safe-area-inset-top));
        right: 18px;
        background: rgba(0,0,0,0.55);
        border: 2px solid rgba(255,255,255,0.6);
        color: #fff;
        font-size: 1.1rem;
        line-height: 1;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        -webkit-tap-highlight-color: transparent;
        font-family: sans-serif;
      }
    </style>
  </head>
  <body>
    <script>
      /* Intercept getUserMedia so MindAR uses the stored camera facing mode */
      (function () {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return;
        var facing = sessionStorage.getItem('cameraFacing') || 'user';
        var _orig = navigator.mediaDevices.getUserMedia.bind(navigator.mediaDevices);
        navigator.mediaDevices.getUserMedia = function (constraints) {
          if (constraints && constraints.video) {
            if (typeof constraints.video === 'object') {
              constraints.video.facingMode = facing;
            } else {
              constraints.video = { facingMode: facing };
            }
          }
          return _orig(constraints);
        };
      })();
    </script>
    <div id="top-bar">
      <span id="app-title"><img src="assets/header.png" alt="JollibeeAR" /></span>
    </div>

    <div id="no-face">
      <img src="assets/noface.png" alt="Smile ka na para lumabas ang WOW BIDA!" />
    </div>

    <div class="example-container">
      <a-scene mindar-face emote-switcher embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights: true, preserveDrawingBuffer: true" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-assets>
          <a-asset-item id="headModel" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/face-tracking/assets/sparkar/headOccluder.glb"></a-asset-item>
          <img id="bee-tex"   src="assets/emotes/bee.png" />
          <img id="jolli-tex" src="assets/emotes/Jolli.png" />
        </a-assets>

        <a-camera active="false" position="0 0 0"></a-camera>

        <a-entity mindar-face-target="anchorIndex: 168">
          <a-gltf-model mindar-face-occluder position="0 -0.3 0.15" rotation="0 0 0" scale="0.065 0.065 0.065" src="#headModel"></a-gltf-model>
        </a-entity>

        <a-entity id="anchor-168" mindar-face-target="anchorIndex: 168">
          <a-image id="bee-img"
                   src="#bee-tex"
                   position="0 0.7 0"
                   width="1.2" height="1.2"
                   transparent="true"
                   visible="true"></a-image>
          <a-image id="jolli-img"
                   src="#jolli-tex"
                   position="0 0.7 0"
                   width="1.2" height="1.2"
                   transparent="true"
                   visible="false"></a-image>
        </a-entity>

        <a-entity id="lm-61"  mindar-face-target="anchorIndex: 61"></a-entity>
        <a-entity id="lm-291" mindar-face-target="anchorIndex: 291"></a-entity>
        <a-entity id="lm-13"  mindar-face-target="anchorIndex: 13"></a-entity>
        <a-entity id="lm-14"  mindar-face-target="anchorIndex: 14"></a-entity>
      </a-scene>
    </div>

    <!-- ── Bottom bar ── -->
    <div id="bottom-bar">
      <button class="bar-side-btn" id="camera-btn" title="Switch camera">
        <img src="assets/change-camera.png" alt="Switch camera" />
      </button>

      <div id="capture-wrap">
        <button id="capture-btn" title="Tap for photo · Hold for video">
          <div id="capture-inner"></div>
        </button>
        <div id="rec-badge">● REC</div>
      </div>

      <button class="bar-side-btn" id="share-btn" title="Share">
        <img src="assets/share-button.png" alt="Share" />
      </button>
    </div>

    <!-- ── Share overlay ── -->
    <div id="share-overlay">
      <img src="assets/share.png" alt="Share — WOW BIDA!" />
      <button id="share-close">✕</button>
    </div>

    <script>
      (function () {
        var captureBtn    = document.getElementById('capture-btn');
        var recBadge      = document.getElementById('rec-badge');
        var shareOverlay  = document.getElementById('share-overlay');
        var HOLD_MS       = 300;
        var holdTimer     = null;
        var isRecording   = false;
        var mediaRecorder = null;
        var chunks        = [];
        var compCanvas    = null;
        var compCtx       = null;
        var rafId         = null;

        // Track which camera is active for correct mirroring
        var currentFacing = sessionStorage.getItem('cameraFacing') || 'user';

        // Preload header image so it is ready when compositing
        var headerImg = new Image();
        headerImg.src = 'assets/header.png';

        function getGlCanvas() {
          return document.querySelector('a-scene canvas') ||
                 document.querySelector('canvas.a-canvas');
        }

        function getVideoEl() {
          return document.querySelector('video');
        }

        function ensureCompCanvas() {
          var gl = getGlCanvas();
          if (!gl) return null;
          var w = gl.width  || gl.offsetWidth;
          var h = gl.height || gl.offsetHeight;
          if (!compCanvas || compCanvas.width !== w || compCanvas.height !== h) {
            compCanvas = document.createElement('canvas');
            compCanvas.width  = w;
            compCanvas.height = h;
            compCtx = compCanvas.getContext('2d');
          }
          return compCanvas;
        }

        // Draw src into dest rect using object-fit:cover cropping (used for GL canvas sizing check)
        function ensureCompCanvas() {
          var gl = getGlCanvas();
          if (!gl) return null;
          var w = gl.width  || gl.offsetWidth;
          var h = gl.height || gl.offsetHeight;
          if (!compCanvas || compCanvas.width !== w || compCanvas.height !== h) {
            compCanvas = document.createElement('canvas');
            compCanvas.width  = w;
            compCanvas.height = h;
            compCtx = compCanvas.getContext('2d');
          }
          return compCanvas;
        }

        function drawComposite() {
          var gl = getGlCanvas();
          if (!compCanvas || !gl) return;
          var w = compCanvas.width;
          var h = compCanvas.height;
          compCtx.clearRect(0, 0, w, h);

          // MindAR applies CSS scaleX(-1) on the canvas element for display.
          // Raw pixel data is unflipped, so we must mirror it ourselves to match
          // what the user sees on screen. This applies to both front and back cameras.
          compCtx.save();
          compCtx.translate(w, 0);
          compCtx.scale(-1, 1);
          compCtx.drawImage(gl, 0, 0, w, h);
          compCtx.restore();

          // Draw header at exactly the same position/size as seen on screen
          if (headerImg.complete && headerImg.naturalWidth > 0) {
            var headerEl = document.querySelector('#app-title img');
            if (headerEl) {
              var rect   = headerEl.getBoundingClientRect();
              var dpr    = window.devicePixelRatio || 1;
              var scaleX = w / (window.innerWidth  * dpr);
              var scaleY = h / (window.innerHeight * dpr);
              compCtx.drawImage(
                headerImg,
                rect.left   * dpr * scaleX,
                rect.top    * dpr * scaleY,
                rect.width  * dpr * scaleX,
                rect.height * dpr * scaleY
              );
            }
          }
        }

        function compLoop() {
          drawComposite();
          rafId = requestAnimationFrame(compLoop);
        }

        function flashScreen() {
          var f = document.createElement('div');
          f.style.cssText = 'position:fixed;inset:0;background:#fff;z-index:200;opacity:0.75;pointer-events:none;transition:opacity 0.35s';
          document.body.appendChild(f);
          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              f.style.opacity = '0';
              setTimeout(function () { document.body.removeChild(f); }, 400);
            });
          });
        }

        function downloadBlob(blob, filename) {
          var url = URL.createObjectURL(blob);
          var a   = document.createElement('a');
          a.href  = url;
          a.download = filename;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          setTimeout(function () { URL.revokeObjectURL(url); }, 2000);
        }

        function takePhoto() {
          var comp = ensureCompCanvas();
          if (!comp) return;
          flashScreen();
          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              drawComposite();
              comp.toBlob(function (blob) {
                if (blob) downloadBlob(blob, 'jollibee-ar-' + Date.now() + '.png');
              }, 'image/png');
            });
          });
        }

        function startRecording() {
          var comp = ensureCompCanvas();
          if (!comp || isRecording) return;
          rafId  = requestAnimationFrame(compLoop);
          chunks = [];
          var stream   = comp.captureStream(30);
          var types    = ['video/webm;codecs=vp9', 'video/webm;codecs=vp8', 'video/webm', 'video/mp4'];
          var mimeType = types.find(function (t) { return MediaRecorder.isTypeSupported(t); }) || '';
          try {
            mediaRecorder = new MediaRecorder(stream, mimeType ? { mimeType: mimeType } : {});
          } catch (e) {
            cancelAnimationFrame(rafId); rafId = null;
            return;
          }
          mediaRecorder.ondataavailable = function (e) {
            if (e.data && e.data.size > 0) chunks.push(e.data);
          };
          mediaRecorder.onstop = function () {
            if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
            var ext  = (mediaRecorder.mimeType || '').includes('mp4') ? 'mp4' : 'webm';
            var blob = new Blob(chunks, { type: mediaRecorder.mimeType || 'video/webm' });
            downloadBlob(blob, 'jollibee-ar-' + Date.now() + '.' + ext);
          };
          mediaRecorder.start(100);
          isRecording = true;
          captureBtn.classList.add('recording');
          recBadge.style.display = 'block';
        }

        function stopRecording() {
          if (!isRecording || !mediaRecorder) return;
          mediaRecorder.stop();
          isRecording = false;
          captureBtn.classList.remove('recording');
          recBadge.style.display = 'none';
        }

        // ── Capture button (tap = photo, hold = video) ──
        captureBtn.addEventListener('pointerdown', function (e) {
          e.preventDefault();
          captureBtn.setPointerCapture(e.pointerId);
          holdTimer = setTimeout(function () {
            holdTimer = null;
            startRecording();
          }, HOLD_MS);
        });

        captureBtn.addEventListener('pointerup', function (e) {
          e.preventDefault();
          if (holdTimer !== null) {
            clearTimeout(holdTimer);
            holdTimer = null;
            takePhoto();
          } else if (isRecording) {
            stopRecording();
          }
        });

        captureBtn.addEventListener('pointercancel', function () {
          if (holdTimer !== null) { clearTimeout(holdTimer); holdTimer = null; }
          if (isRecording) stopRecording();
        });

        // ── Camera toggle (front ↔ back) ──
        document.getElementById('camera-btn').addEventListener('click', function () {
          var next = currentFacing === 'user' ? 'environment' : 'user';
          sessionStorage.setItem('cameraFacing', next);
          window.location.reload();
        });

        // ── Share button — show share.png overlay ──
        document.getElementById('share-btn').addEventListener('click', function () {
          shareOverlay.classList.add('visible');
        });

        document.getElementById('share-close').addEventListener('click', function () {
          shareOverlay.classList.remove('visible');
        });

        // Close overlay on background tap
        shareOverlay.addEventListener('click', function (e) {
          if (e.target === shareOverlay) shareOverlay.classList.remove('visible');
        });
      })();
    </script>
  </body>
</html>
