<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#000000" />
    <title>JollibeeAR</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-face-aframe.prod.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        var beeImg   = document.getElementById("bee-img");
        var jolliImg = document.getElementById("jolli-img");
        var noFace   = document.getElementById("no-face");
        var showBee  = true;

        // Alternate every 1s — MindAR hides the parent entity when no face,
        // so emotes only render when a face is actually tracked.
        setInterval(function () {
          showBee = !showBee;
          beeImg.setAttribute("visible",   String(showBee));
          jolliImg.setAttribute("visible", String(!showBee));
        }, 1000);

        // Hide the "point camera at face" prompt once AR is live
        document.querySelector("a-scene").addEventListener("arReady", function () {
          noFace.style.display = "none";
        });
      });
    </script>
    <style>
      body {
        margin: 0;
        background: #000;
        /* prevent iOS bounce/pull-to-refresh interfering with camera */
        overscroll-behavior: none;
        /* prevent accidental text selection on tap */
        -webkit-user-select: none;
        user-select: none;
      }
      html, body {
        /* fill viewport on iOS Safari including notch area */
        height: 100%;
        height: -webkit-fill-available;
      }
      .example-container {
        overflow: hidden;
        position: absolute;
        width: 100%;
        height: 100%;
        /* prevent scroll/zoom gestures cancelling camera on mobile */
        touch-action: none;
      }
      #no-face {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        color: rgba(255,255,255,0.85);
        pointer-events: none;
        z-index: 50;
        font-family: sans-serif;
        text-align: center;
      }
      #no-face span { font-size: 3rem; }
      #no-face p    { font-size: 1rem; }
      #top-bar {
        position: fixed;
        top: 0; left: 0; right: 0;
        /* push content below notch/status bar on iOS */
        padding-top: max(12px, env(safe-area-inset-top));
        padding-left: max(16px, env(safe-area-inset-left));
        padding-right: max(16px, env(safe-area-inset-right));
        padding-bottom: 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: linear-gradient(to bottom, rgba(0,0,0,0.55) 0%, transparent 100%);
        z-index: 100;
        font-family: sans-serif;
        color: #fff;
      }
      #app-title { font-weight: bold; font-size: 1.1rem; }
      #snap-btn {
        background: none;
        border: none;
        font-size: 1.5rem;
        cursor: pointer;
        /* 48px min touch target for mobile */
        min-width: 48px;
        min-height: 48px;
        -webkit-tap-highlight-color: transparent;
      }
    </style>
  </head>
  <body>
    <div id="top-bar">
      <span id="app-title">JollibeeAR</span>
      <button id="snap-btn" title="Take screenshot">📸</button>
    </div>

    <div id="no-face">
      <span>😶</span>
      <p>Point your camera at a face</p>
    </div>

    <div class="example-container">
      <a-scene mindar-face embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-assets>
          <a-asset-item id="headModel" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/face-tracking/assets/sparkar/headOccluder.glb"></a-asset-item>
          <img id="bee-tex"   src="assets/emotes/bee.png" />
          <img id="jolli-tex" src="assets/emotes/Jolli.png" />
        </a-assets>

        <a-camera active="false" position="0 0 0"></a-camera>

        <!-- head occluder — required for face mesh to initialise -->
        <a-entity mindar-face-target="anchorIndex: 168">
          <a-gltf-model mindar-face-occluder position="0 -0.3 0.15" rotation="0 0 0" scale="0.065 0.065 0.065" src="#headModel"></a-gltf-model>
        </a-entity>

        <!-- anchor 168 = nose bridge, emotes offset up to forehead -->
        <a-entity id="anchor-168" mindar-face-target="anchorIndex: 168">
          <a-image id="bee-img"
                   src="#bee-tex"
                   position="0 0.7 0"
                   width="1.2" height="1.2"
                   transparent="true"
                   visible="true"></a-image>
          <a-image id="jolli-img"
                   src="#jolli-tex"
                   position="0 0.7 0"
                   width="1.2" height="1.2"
                   transparent="true"
                   visible="false"></a-image>
        </a-entity>
      </a-scene>
    </div>
  </body>
</html>
