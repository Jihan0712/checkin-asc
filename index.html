<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="JollibeeAR – put a Jollibee emote on your forehead!" />
    <title>JollibeeAR</title>

    <!-- PWA manifest -->
    <link rel="manifest" href="manifest.json" />

    <!-- A-Frame + MindAR face bundle -->
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-face-aframe.prod.js"></script>

    <link rel="stylesheet" href="src/style.css" />
  </head>
  <body>
    <div class="ar-container">

      <!-- Insecure-context banner: shown by JS when not HTTPS/localhost -->
      <div id="insecure-banner">
        <span>🔒</span>
        <strong>Camera requires a secure connection</strong>
        <p>Open via <b>Live Server</b> in VS Code<br>(right-click index.html → Open with Live Server)<br>or deploy to Vercel for HTTPS.</p>
      </div>

      <!-- UI overlays -->
      <div id="top-bar">
        <span id="app-title">JollibeeAR</span>
        <button id="snap-btn" title="Take screenshot">📸</button>
      </div>

      <!-- starts visible — becomes hidden when face is found -->
      <div id="no-face">
        <span>😶</span>
        <p>Loading… point your camera at a face</p>
      </div>

      <div id="flash"></div>

      <!-- A-Frame AR scene — structure mirrors the working MindAR example -->
      <a-scene mindar-face
               embedded
               color-space="sRGB"
               renderer="colorManagement: true, physicallyCorrectLights, preserveDrawingBuffer: true"
               vr-mode-ui="enabled: false"
               device-orientation-permission-ui="enabled: false">

        <a-assets timeout="5000">
          <img id="bee-tex"   src="assets/emotes/bee.png"   crossorigin="anonymous" />
          <img id="jolli-tex" src="assets/emotes/Jolli.png" crossorigin="anonymous" />
        </a-assets>

        <a-camera active="false" position="0 0 0" look-controls="enabled: false"></a-camera>

        <!-- Forehead emote — anchor 10 = top of forehead -->
        <a-entity id="forehead-anchor" mindar-face-target="anchorIndex: 10">
          <a-image id="bee-img"
                   src="#bee-tex"
                   position="0 0 0.1"
                   width="0.5" height="0.5"
                   transparent="true"
                   visible="false"></a-image>
          <a-image id="jolli-img"
                   src="#jolli-tex"
                   position="0 0 0.1"
                   width="0.5" height="0.5"
                   transparent="true"
                   visible="false"></a-image>
        </a-entity>

      </a-scene>
    </div>

    <script src="src/main.js" defer></script>
  </body>
</html>
