<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- Platform detector: redirect iOS/Safari to iosAR.html -->
    <script>
      (function () {
        var ua = navigator.userAgent || '';
        var isIOS = /iPhone|iPad|iPod/i.test(ua);
        // iPadOS 13+ reports as MacIntel with touch support
        var isIPadOS = /Macintosh/i.test(ua) && navigator.maxTouchPoints > 1;
        if (isIOS || isIPadOS) {
          window.location.replace('iosAR.html');
        }
      })();
    </script>
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#000000" />
    <meta http-equiv="Permissions-Policy" content="camera=*, microphone=*">
    <title>JollibeeAR</title>

    <link rel="stylesheet" href="src/style.css" />
  <!-- Chrome: patch createElement so every <video> is born muted + playsinline.
       MutationObserver callbacks are microtasks and fire AFTER MindAR's
       synchronous play() call, so Chrome's autoplay check races and blocks it.
       Patching at element-creation time is fully race-free. -->
  <script>
    (function () {
      var _origCreate = document.createElement.bind(document);
      document.createElement = function (tag) {
        var el = _origCreate(tag);
        if (typeof tag === 'string' && tag.toLowerCase() === 'video') {
          el.muted = true;
          el.playsInline = true;
          el.setAttribute('playsinline', '');
          el.setAttribute('muted', '');
          el.setAttribute('autoplay', '');
          el.setAttribute('webkit-playsinline', '');
        }
        return el;
      };
    })();
  </script>
    <!-- A-Frame + MindAR must load before ar.js registers its component -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-face-aframe.prod.js"></script>
    <script src="src/ar.js"></script>
  </head>
  <body>
    <!-- getUserMedia intercept: must run before MindAR touches the camera -->
    <script>
      (function () {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return;
        var facing = sessionStorage.getItem('cameraFacing') || 'user';
        var _orig = navigator.mediaDevices.getUserMedia.bind(navigator.mediaDevices);
        navigator.mediaDevices.getUserMedia = function (constraints) {
          if (constraints && constraints.video) {
            if (typeof constraints.video === 'object') {
              constraints.video.facingMode = facing;
              // Ideal 16:9 resolution so MindAR's projection calibrates
              // consistently across browsers (Chrome may default to 4:3)
              if (!constraints.video.width)  constraints.video.width  = { ideal: 1280 };
              if (!constraints.video.height) constraints.video.height = { ideal: 720 };
            } else {
              constraints.video = {
                facingMode: facing,
                width:  { ideal: 1280 },
                height: { ideal: 720 }
              };
            }
          }
          return _orig(constraints).catch(function (err) {
            console.error('[JollibeeAR] Camera error:', err.name, err.message);
            if (err.name === 'NotAllowedError' ||
                err.name === 'PermissionDeniedError' ||
                err.name === 'SecurityError') {
              var errEl = document.getElementById('camera-error');
              if (errEl) errEl.style.display = 'flex';
            }
            throw err;
          });
        };
      })();
    </script>

    <!-- Back-camera: mirror the AR container to display correctly on screen -->
    <script>
      (function () {
        if ((sessionStorage.getItem('cameraFacing') || 'user') === 'environment') {
          document.addEventListener('DOMContentLoaded', function () {
            var el = document.querySelector('.ar-container');
            if (el) el.style.transform = 'scaleX(-1)';
          });
        }
      })();
    </script>

    <div id="top-bar">
      <img src="assets/header.png" alt="JollibeeAR" />
    </div>

    <div id="no-face">
      <img src="assets/noface.png" alt="Smile ka na para lumabas ang WOW BIDA!" />
    </div>

    <!-- Shown when Chrome blocks camera access -->
    <div id="camera-error">
      <p>Camera access is required for this experience.<br>
         Please allow camera in your browser settings, then reload.</p>
      <button onclick="location.reload()">Reload</button>
    </div>

    <div class="ar-container">
      <a-scene
        mindar-face
        emote-switcher
        embedded
        color-space="sRGB"
        renderer="colorManagement: true; physicallyCorrectLights: true; preserveDrawingBuffer: true; alpha: true"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
      >
        <a-assets>
          <a-asset-item id="headModel" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/face-tracking/assets/sparkar/headOccluder.glb"></a-asset-item>
          <img id="bee-tex"        src="assets/emotes/bee.png" />
          <img id="jolli-tex"      src="assets/emotes/Jolli.png" />
          <img id="back-bee-tex"   src="assets/emotes/back_bee.png" />
          <img id="back-jolli-tex" src="assets/emotes/back_jolli.png" />
        </a-assets>

        <a-camera active="false" position="0 0 0" look-controls="enabled: false"></a-camera>

        <!-- Head occluder anchor -->
        <a-entity mindar-face-target="anchorIndex: 168">
          <a-gltf-model
            mindar-face-occluder
            position="0 -0.3 0.15"
            rotation="0 0 0"
            scale="0.065 0.065 0.065"
            src="#headModel"
          ></a-gltf-model>
        </a-entity>

        <!-- Emote anchor -->
        <a-entity id="anchor-168" mindar-face-target="anchorIndex: 168">
          <a-image id="bee-img"   src="#bee-tex"   position="0 0.7 0" width="1.2" height="1.2" transparent="true" visible="true"></a-image>
          <a-image id="jolli-img" src="#jolli-tex" position="0 0.7 0" width="1.2" height="1.2" transparent="true" visible="false"></a-image>
        </a-entity>

        <!-- Smile landmark anchors -->
        <a-entity id="lm-61"  mindar-face-target="anchorIndex: 61"></a-entity>
        <a-entity id="lm-291" mindar-face-target="anchorIndex: 291"></a-entity>
        <a-entity id="lm-13"  mindar-face-target="anchorIndex: 13"></a-entity>
        <a-entity id="lm-14"  mindar-face-target="anchorIndex: 14"></a-entity>
      </a-scene>
    </div>

    <div id="bottom-bar">
      <button class="bar-btn" id="camera-btn" title="Switch camera">
        <img src="assets/change-camera.png" alt="Switch camera" />
      </button>
      <div id="capture-wrap">
        <button id="capture-btn" title="Tap for photo, Hold for video">
          <div id="capture-inner"></div>
        </button>
        <div id="rec-badge">&#9679; REC</div>
      </div>
      <button class="bar-btn" id="share-btn" title="Share">
        <img src="assets/share-button.png" alt="Share" />
      </button>
    </div>

    <div id="share-overlay">
      <img src="assets/share.png" alt="Share - WOW BIDA!" />
      <button id="share-close">&#x2715;</button>
    </div>

    <div id="processing-overlay">
      <div class="processing-box">
        <div class="processing-spinner"></div>
        <p>Processing video…</p>
      </div>
    </div>

    <script type="module" src="src/main.js"></script>

    <!-- video muting handled by the createElement patch in <head> -->
  </body>
</html>
