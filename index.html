<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="JollibeeAR – put a Jollibee emote on your forehead!" />
    <title>JollibeeAR</title>

    <!-- PWA manifest -->
    <link rel="manifest" href="manifest.json" />

    <!-- A-Frame + MindAR face bundle -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-face-aframe.prod.js"></script>

    <link rel="stylesheet" href="src/style.css" />
  </head>
  <body>
    <div class="ar-container">

      <!-- Insecure-context banner: shown by JS when not HTTPS/localhost -->
      <div id="insecure-banner">
        <span>🔒</span>
        <strong>Camera requires a secure connection</strong>
        <p>Open via <b>Live Server</b> in VS Code<br>(right-click index.html → Open with Live Server)<br>or deploy to Vercel for HTTPS.</p>
      </div>

      <!-- UI overlays -->
      <div id="top-bar">
        <span id="app-title">JollibeeAR</span>
        <button id="snap-btn" title="Take screenshot">📸</button>
      </div>

      <!-- starts visible — becomes hidden when face is found -->
      <div id="no-face">
        <span>😶</span>
        <p>Loading… point your camera at a face</p>
      </div>

      <div id="flash"></div>

      <!-- A-Frame AR scene — structure mirrors the working MindAR example -->
      <a-scene mindar-face
               embedded
               color-space="sRGB"
               renderer="colorManagement: true, physicallyCorrectLights, preserveDrawingBuffer: true"
               vr-mode-ui="enabled: false"
               device-orientation-permission-ui="enabled: false">

        <a-assets>
          <!-- Head occluder (makes tracking more stable) -->
          <a-asset-item id="headModel" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/face-tracking/assets/sparkar/headOccluder.glb"></a-asset-item>
          <img id="bee-tex"   src="assets/emotes/bee.png"   crossorigin="anonymous" />
          <img id="jolli-tex" src="assets/emotes/Jolli.png" crossorigin="anonymous" />
        </a-assets>

        <a-camera active="false" position="0 0 0"></a-camera>

        <!-- Head occluder anchor — same as working example -->
        <a-entity mindar-face-target="anchorIndex: 168">
          <a-gltf-model mindar-face-occluder
                        position="0 -0.3 0.15"
                        rotation="0 0 0"
                        scale="0.065 0.065 0.065"
                        src="#headModel"></a-gltf-model>
        </a-entity>

        <!-- Forehead emote — anchor 10 = top of forehead -->
        <a-entity id="forehead-anchor" mindar-face-target="anchorIndex: 10">
          <a-image id="bee-img"
                   src="#bee-tex"
                   position="0 0 0.1"
                   width="0.5" height="0.5"
                   transparent="true"
                   visible="false"></a-image>
          <a-image id="jolli-img"
                   src="#jolli-tex"
                   position="0 0 0.1"
                   width="0.5" height="0.5"
                   transparent="true"
                   visible="false"></a-image>
        </a-entity>

      </a-scene>
    </div>

    <script src="src/main.js" defer></script>

    <!-- ══ DEBUG PANEL — remove before shipping ══ -->
    <style>
      #dbg {
        position: fixed; bottom: 0; left: 0; right: 0;
        background: rgba(0,0,0,0.75); color: #0f0;
        font: 11px/1.5 monospace; padding: 6px 10px;
        z-index: 9999; pointer-events: none;
        white-space: pre-wrap;
      }
    </style>
    <div id="dbg">⏳ waiting for a-scene…</div>
    <script>
      const dbg = document.getElementById("dbg");
      const log = (msg) => { dbg.textContent = msg; console.log("[DBG]", msg); };

      document.addEventListener("DOMContentLoaded", () => {
        const scene  = document.querySelector("a-scene");
        const anchor = document.getElementById("forehead-anchor");

        if (!scene)  { log("❌ No <a-scene> found!"); return; }
        if (!anchor) { log("❌ No #forehead-anchor found!"); return; }

        log("✅ DOM ready — scene + anchor found\n⏳ waiting for MindAR events…");

        scene.addEventListener("arReady",  () => log("✅ arReady — MindAR started, camera live"));
        scene.addEventListener("arError",  (e) => log("❌ arError — " + (e.detail || "camera denied/unavailable")));

        anchor.addEventListener("targetFound", () => log("🎯 targetFound — face detected at anchor 10!"));
        anchor.addEventListener("targetLost",  () => log("😶 targetLost — face left frame"));

        // Log a-scene loaded state
        if (scene.hasLoaded) {
          log("✅ DOM ready — scene already loaded\n⏳ waiting for MindAR…");
        } else {
          scene.addEventListener("loaded", () => log("✅ a-scene loaded\n⏳ waiting for arReady…"));
        }
      });
    </script>
    <!-- ══ END DEBUG ══ -->
  </body>
</html>
